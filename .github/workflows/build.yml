name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: sacredbanana/amiga-compiler:m68k-amigaos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build SDK and plugins
        run: make all

      - name: List build artifacts
        run: ls -la build/*.p

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp build/*.p dist/
          for dir in src/*/; do
            plugin=$(basename "$dir")
            if [ -f "$dir/README.md" ]; then
              cp "$dir/README.md" "dist/${plugin}_README.md"
            fi
          done
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amiga-lw-plugins
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: amiga-lw-plugins
          path: plugins

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: plugins/*
          generate_release_notes: true
